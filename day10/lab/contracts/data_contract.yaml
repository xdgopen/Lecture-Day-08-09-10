# Data contract — Lab Day 10 (tiếp nối artifact CS + IT Helpdesk)
# Sinh viên bổ sung owner, SLA freshness, và nguồn canonical.

version: "1.1"
dataset: "kb_chunk_export"
owner_team: "AI in Action Day 10 lab team"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "ID ổn định sau clean (thường hash hoặc doc_id + seq)"
  doc_id:
    type: string
    required: true
    description: "Khóa logic tài liệu nguồn (vd policy_refund_v4)"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Không được để chunk policy refund chứa cửa sổ 14 ngày (lệch so với v4 = 7 ngày)"
    severity: "halt"
  - id: "required_doc_ids_present"
    description: "Cleaned corpus phải có đủ 5 nguồn dùng cho grading/retrieval."
    severity: "halt"
  - id: "no_stale_hr_policy_content"
    description: "Không publish HR annual leave bản 2025 / 10 ngày phép năm."
    severity: "halt"
  - id: "exported_at_iso_datetime"
    description: "Metadata exported_at phải parse được ISO datetime."
    severity: "halt"
  - id: "no_ambiguous_chunk_text"
    description: "Không publish chunk có marker Nội dung không rõ ràng."
    severity: "halt"
  - id: "sla_p1_no_p2_priority_chunk"
    description: "Corpus SLA P1 không publish chunk P2 gây nhiễu top-k P1."
    severity: "halt"

freshness:
  measured_at: "publish"  # ingest | cleaned | publish
  sla_hours: 24
  alert_channel: "lab-console-and-artifacts/logs"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"
  - path: "data/docs/access_control_sop.txt"
    doc_id: "access_control_sop"

# Baseline allowlist export — nhóm mở rộng doc mới phải đồng bộ cleaning_rules + contract.
allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy
  - access_control_sop

# Merit/Distinction: có thể đưa cutoff versioning vào env và tham chiếu ở đây (tránh hard-code trong code).
policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
  sla_scope: "P1 only for this lab corpus"
  refund_window_days: 7
